<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>경쟁학원 모니터링</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --black:#111111;--white:#fff;--ground:#f5f6f7;--bdr:#e4e6e9;
  --txt:#111111;--txt-mid:#6b7280;--txt-dim:#9ca3af;
  --acc:#00a891;--acc-bg:#edfaf7;--acc-border:#b2ede3;
}
body{display:flex;flex-direction:column;height:100vh;overflow:hidden;font-family:'Segoe UI Variable Display','Segoe UI',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--white);color:var(--txt);font-size:14px;}

/* TOPBAR */
.mon-topbar{height:56px;background:var(--white);border-bottom:1px solid var(--bdr);padding:0 28px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.mon-topbar-logo{font-size:15px;font-weight:700;letter-spacing:-.03em;color:var(--black);}
.mon-btn-outline{padding:7px 16px;border-radius:6px;border:1px solid var(--bdr);background:transparent;color:var(--txt);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:border-color .12s;}
.mon-btn-outline:hover{border-color:var(--black);}

/* FILTER BAR */
#page-monitor{display:flex;flex:1;flex-direction:column;overflow:hidden;height:100%;}
.mon-filter-bar{background:var(--white);border-bottom:1px solid var(--bdr);padding:10px 28px;display:flex;align-items:flex-start;gap:16px;flex-shrink:0;flex-wrap:wrap;}
.mon-filter-label{font-size:10px;font-weight:700;color:var(--txt-dim);letter-spacing:.08em;text-transform:uppercase;white-space:nowrap;align-self:center;}
.mon-pill{font-size:12.5px;padding:5px 14px;border-radius:99px;border:1px solid var(--bdr);background:var(--white);color:var(--txt-mid);cursor:pointer;transition:all .12s;white-space:nowrap;font-weight:500;letter-spacing:-.01em;font-family:inherit;}
.mon-pill:hover{border-color:var(--black);color:var(--black);}
.mon-pill.active-region{background:var(--black);color:#fff;border-color:var(--black);}
.mon-pill.active-date{background:var(--acc);color:#fff;border-color:var(--acc);}
.mon-sep{width:1px;height:20px;background:var(--bdr);align-self:center;}

/* MAIN */
.mon-main{display:flex;flex:1;overflow:hidden;}
.mon-left{width:390px;border-right:1px solid var(--bdr);display:flex;flex-direction:column;background:var(--white);overflow:hidden;flex-shrink:0;}
.mon-left-header{padding:14px 24px 10px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.mon-left-header-title{font-size:13px;font-weight:700;letter-spacing:-.02em;color:var(--txt);}
.mon-left-header-count{font-size:12px;color:var(--txt-dim);}
.mon-list-head{display:grid;grid-template-columns:44px 1fr 56px 44px 44px;gap:4px;padding:8px 24px;font-size:10px;font-weight:700;color:var(--txt-dim);letter-spacing:.07em;text-transform:uppercase;border-bottom:1px solid var(--bdr);flex-shrink:0;}
.mon-list-scroll{overflow-y:auto;flex:1;}
.mon-list-scroll::-webkit-scrollbar{width:3px;}
.mon-list-scroll::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:99px;}

/* ROW */
.mon-ac-row{display:grid;grid-template-columns:44px 1fr 56px 44px 44px;gap:4px;align-items:center;padding:12px 24px;border-bottom:1px solid #f3f4f6;cursor:pointer;transition:background .1s;}
.mon-ac-row:hover{background:var(--ground);}
.mon-ac-row.selected{background:var(--acc-bg);border-left:2.5px solid var(--acc);padding-left:calc(24px - 2.5px);}
.mon-rank{font-size:20px;font-weight:300;color:#ddd;text-align:center;font-variant-numeric:tabular-nums;line-height:1;letter-spacing:-.02em;}
.mon-rank.top{color:var(--black);font-weight:700;font-size:14px;}
.mon-ac-name-wrap{display:flex;flex-direction:column;gap:4px;min-width:0;}
.mon-ac-name{font-size:13.5px;font-weight:600;color:var(--txt);display:flex;align-items:center;gap:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.02em;}
.mon-badge-us{font-size:9px;background:var(--black);color:#fff;padding:1px 6px;border-radius:3px;flex-shrink:0;font-weight:700;letter-spacing:.05em;text-transform:uppercase;}
.mon-mini-bar-wrap{height:2px;background:#f0f1f2;border-radius:2px;}
.mon-mini-bar{height:2px;border-radius:2px;background:#d1d5db;}
.mon-mini-bar.us{background:var(--acc);}
.mon-mention{font-size:13px;color:var(--txt-mid);text-align:center;font-variant-numeric:tabular-nums;font-weight:500;}
.mon-pros{font-size:13px;color:var(--acc);text-align:center;font-weight:600;font-variant-numeric:tabular-nums;}
.mon-cons{font-size:13px;color:#9ca3af;text-align:center;font-weight:600;font-variant-numeric:tabular-nums;}
.mon-na{color:#ddd;}

/* RIGHT */
.mon-right{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--ground);}
.mon-right-scroll{overflow-y:auto;flex:1;padding:24px 28px;display:flex;flex-direction:column;gap:14px;}
.mon-right-scroll::-webkit-scrollbar{width:3px;}
.mon-right-scroll::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:99px;}
.mon-detail-header{display:flex;align-items:flex-start;justify-content:space-between;}
.mon-detail-name{font-size:22px;font-weight:700;color:var(--black);display:flex;align-items:center;gap:8px;letter-spacing:-.04em;line-height:1.1;}
.mon-detail-meta{font-size:12px;color:var(--txt-dim);margin-top:4px;}
.mon-detail-stats{display:flex;gap:10px;}
.mon-dstat{background:var(--white);border:1px solid var(--bdr);border-radius:8px;padding:16px 20px;flex:1;}
.mon-dstat-val{font-size:32px;font-weight:300;color:var(--black);letter-spacing:-.05em;line-height:1;font-variant-numeric:tabular-nums;}
.mon-dstat-val.pos{color:var(--acc);}
.mon-dstat-val.neg{color:#9ca3af;}
.mon-dstat-label{font-size:10px;font-weight:700;color:var(--txt-dim);margin-top:8px;letter-spacing:.07em;text-transform:uppercase;}
.mon-section{background:var(--white);border:1px solid var(--bdr);border-radius:8px;padding:18px 20px;}
.mon-section-title{font-size:10px;font-weight:700;color:var(--txt-dim);margin-bottom:14px;display:flex;align-items:center;gap:6px;letter-spacing:.08em;text-transform:uppercase;}
.mon-chart-wrap{position:relative;height:200px;}
.mon-tags-area{display:flex;gap:7px;flex-wrap:wrap;}
.mon-tag{font-size:12.5px;padding:5px 14px;border-radius:99px;border:1px solid;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .15s;font-weight:500;letter-spacing:-.01em;}
.mon-tag.pos{background:var(--acc-bg);color:var(--acc);border-color:var(--acc-border);}
.mon-tag.pos:hover,.mon-tag.pos.sel{background:var(--acc);color:#fff;border-color:var(--acc);}
.mon-tag.neg{background:#f9fafb;color:#6b7280;border-color:var(--bdr);}
.mon-tag.neg:hover,.mon-tag.neg.sel{background:var(--black);color:#fff;border-color:var(--black);}
.mon-tag-count{opacity:.65;font-size:11px;}
.mon-posts-box{background:var(--ground);border:1px solid var(--bdr);border-radius:6px;overflow:hidden;margin-top:12px;}
.mon-posts-box-head{padding:8px 14px;font-size:11px;font-weight:700;color:var(--txt-mid);border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:7px;background:var(--white);letter-spacing:.02em;}
.mon-active-tag-pill{font-size:11px;padding:2px 8px;border-radius:99px;font-weight:700;}
.mon-active-tag-pill.pos{background:var(--acc);color:#fff;}
.mon-active-tag-pill.neg{background:var(--black);color:#fff;}
.mon-post-item{display:flex;align-items:flex-start;justify-content:space-between;padding:11px 14px;border-bottom:1px solid #f0f1f2;gap:12px;}
.mon-post-item:last-child{border-bottom:none;}
.mon-post-txt{font-size:12.5px;color:var(--txt);line-height:1.65;flex:1;}
.mon-post-link{font-size:11.5px;color:var(--acc);white-space:nowrap;text-decoration:none;flex-shrink:0;font-weight:600;}
.mon-post-link:hover{text-decoration:underline;}
.mon-post-content{flex:1;min-width:0;}
.mon-post-quote{font-size:13px;color:var(--txt);line-height:1.65;font-style:italic;}
.mon-post-txt{font-size:12.5px;color:var(--txt-mid);line-height:1.65;}
.mon-empty-right{flex:1;display:flex;align-items:center;justify-content:center;color:var(--txt-dim);font-size:13px;}
@media(max-width:720px){
  body{height:auto;overflow:auto;}
  .mon-main{flex-direction:column;overflow:visible;}
  .mon-left{width:100%;border-right:none;border-bottom:1px solid var(--bdr);max-height:50vh;}
  .mon-right{min-height:50vh;}
}
</style>
</head>
<body>

<div id="page-monitor">
  <div class="mon-topbar">
    <div class="mon-topbar-logo">경쟁학원 모니터링</div>
  </div>
  <div class="mon-filter-bar">
    <div class="mon-filter-label">지역</div>
    <div id="mon-region-group" style="display:flex;gap:6px;align-items:center;">
      <div class="mon-pill active-region" onclick="monSetRegion(this,'전체')">전체</div>
      <div class="mon-pill" onclick="monSetRegion(this,'광진')">광진</div>
      <div class="mon-pill" onclick="monSetRegion(this,'성동')">성동</div>
      <div class="mon-pill" onclick="monSetRegion(this,'동대문')">동대문</div>
      <div class="mon-pill" onclick="monSetRegion(this,'중랑')">중랑</div>
      <div class="mon-pill" onclick="monSetRegion(this,'중계')">중계</div>
      <div class="mon-pill" onclick="monSetRegion(this,'미사')">미사</div>
      <div class="mon-pill" onclick="monSetRegion(this,'방이')">방이</div>
    </div>
    <div class="mon-sep"></div>
    <div style="display:flex;flex-direction:column;gap:4px;align-items:flex-start;">
      <div style="display:flex;gap:6px;align-items:center;">
        <div class="mon-filter-label">기간</div>
        <div id="mon-date-group" style="display:flex;gap:6px;align-items:center;">
          <div class="mon-pill active-date" onclick="monSetDate(this,'전체')">전체</div>
          <div class="mon-pill mon-year-pill" onclick="monToggleYear(this,'2026년')">2026년 ▾</div>
          <div class="mon-pill mon-year-pill" onclick="monToggleYear(this,'2025년')">2025년 ▾</div>
          <div class="mon-pill mon-year-pill" onclick="monToggleYear(this,'2024년')">2024년 ▾</div>
        </div>
      </div>
      <div id="mon-month-popup" style="display:none;padding-left:2px;"></div>
    </div>
  </div>
  <div class="mon-main">
    <div class="mon-left">
      <div class="mon-left-header">
        <div class="mon-left-header-title">학원 언급 순위</div>
        <div class="mon-left-header-count" id="mon-list-count">전체 0개</div>
      </div>
      <div class="mon-list-head">
        <span>#</span><span>학원명</span><span style="text-align:center">언급</span><span style="text-align:center">장점</span><span style="text-align:center">단점</span>
      </div>
      <div class="mon-list-scroll" id="mon-ac-list"></div>
    </div>
    <div class="mon-right">
      <div class="mon-right-scroll" id="mon-right-panel">
        <div class="mon-empty-right">← 학원을 선택하면 상세 내용이 표시됩니다</div>
      </div>
    </div>
  </div>
</div>

<script src="js/monitor.js"></script>
<script>monRenderList();var _fl=monGetFiltered();if(_fl.length)monSelectAc(MON_DATA.indexOf(_fl[0]));</script>
</body>
</html>
